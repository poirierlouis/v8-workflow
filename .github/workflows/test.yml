name: Test Static Library

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Static Library"]
    types:
      - completed

env:
  V8_VERSION: "14.9.207.21"
  V8_COMMIT: "5a39b146dd810a52812202fae891281d5dc4db7d"

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download V8 Artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: v8-release
          run_id: ${{ github.event.workflow_run.id || '' }}
          workflow: build.yml
          check_artifacts: true
          search_artifacts: true

      - name: Extract V8 Release
        run: |
          mkdir -p v8/linux/x64/
          tar -xzf v8-${{ env.V8_VERSION }}-linux64.tar.gz -C v8/linux/x64/

      - name: Install Clang
        run: sudo apt-get install -y clang

      - name: Compile Test Code
        run: |
          clang++ simple.cpp -o simple \
            -std=c++20 \
            -I./v8/linux/x64 \
            -I./v8/linux/x64/include \
            -L./v8/linux/x64/lib \
            -lv8_monolith \
            -fno-rtti \
            -fuse-ld=lld \
            -pthread \
            -ldl

      - name: Run and Verify Example
        run: |
          ./simple > output.txt
          exit_code=$?
          
          echo "--- Program Output ---"
          cat output.txt
          echo "----------------------"
          
          if [ $exit_code -ne 0 ]; then
            echo "Error: Execution failed with exit code $exit_code"
            exit 1
          fi
          
          cat << 'EOF' > expected.txt
          Hello, World!
          EOF
          
          if diff -q output.txt expected.txt > /dev/null; then
            echo "Success: Output matches expected results exactly."
          else
            echo "Error: Output does not match expected format."
            echo "Expected:"
            cat expected.txt
            exit 1
          fi