name: V8 monolith - Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install LLVM/Clang v22
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "C:\llvm-clang"
          
          Write-Host "Downloading LLVM 22.1.7"
          $ProgressPreference = 'SilentlyContinue'
          curl.exe -L -o "llvm-clang.tar.xz" "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.7/clang+llvm-22.1.7-x86_64-pc-windows-msvc.tar.xz"
          
          Write-Host "Installing LLVM 22.1.7"
          tar -xf llvm-clang.tar.xz -C "C:\llvm-clang"
          Rename-Item -Path "C:\llvm-clang\clang+llvm-22.1.7-x86_64-pc-windows-msvc" -NewName "22.1.7"
          echo "C:\llvm-clang\22.1.7\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install depot_tools
        shell: cmd
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git C:\depot_tools
          echo C:\depot_tools>> %GITHUB_PATH%

      - name: Configure depot_tools
        shell: cmd
        env:
          PYTHONHTTPSVERIFY: 0
        run: |
          call gclient
          git config --global depot-tools.allowGlobalGitConfig true

      - name: Fetch V8
        shell: cmd
        run: |
          call fetch v8
          cd v8
          git checkout 14.6.202.34
          call gclient sync -D --force --reset

      - name: Patch V8
        shell: cmd
        run: |
          cd v8\
          git apply ..\win\x64\patches\v8_14.6.202.34.patch
          
          cd build
          git apply ..\..\win\x64\patches\v8_build_14.6.202.34.patch

      - name: Run GN
        shell: cmd
        run: |
          cd v8\
          mkdir out\release
          copy ..\win\x64\args.gn out\release\args.gn
          call gn gen out\release

      - name: Compile V8
        shell: cmd
        run: |
          cd v8\
          call ninja -C out\release v8_monolith

      - name: Stage Artifact
        shell: cmd
        run: |
          mkdir dist\lib
          mkdir dist\include
          
          copy v8\out\release\obj\v8_monolith.lib dist\lib\
          xcopy v8\include\*.h dist\include /E /I /Y
          copy v8\LICENSE* dist\

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: v8-14.6.202.34-win64
          path: dist/