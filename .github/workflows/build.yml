name: Build Static Library

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  V8_VERSION: "14.9.207.21"
  V8_COMMIT: "5a39b146dd810a52812202fae891281d5dc4db7d"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH

      - name: Setup GClient
        run: |
          gclient config --name=v8 https://chromium.googlesource.com/v8/v8.git
          cat <<EOF >> .gclient
          target_os = ["linux"]
          custom_deps = {
          "v8/third_party/android_sdk": False,
          "v8/third_party/catapult": False,
          "v8/tools/luci-go": False,
          }
          EOF

      - name: Fetch V8
        run: |
          gclient sync -D --no-history --reset --revision=v8@${{ env.V8_COMMIT }}

      - name: Install Build Dependencies
        run: |
          cd v8
          sudo ./build/install-build-deps.sh --no-prompt --no-chromeos-fonts --no-nacl --no-arm

      - name: Configure GN Build Args
        run: |
          cd v8
          mkdir -p out/Release
          cat <<EOF > out/Release/args.gn
          target_cpu = "x64"
          is_component_build = false
          is_debug = false
          symbol_level = 0
          treat_warnings_as_errors = false
          use_custom_libcxx = false
          use_sysroot = false
          use_thin_lto = false
          allow_experimental_crel = false
          v8_enable_sandbox = false
          v8_enable_pointer_compression = false
          v8_enable_webassembly = false
          v8_enable_i18n_support = false
          v8_monolithic = true
          v8_use_external_startup_data = false
          EOF
          gn gen out/Release

      - name: Build V8 Static Library
        run: |
          cd v8
          ninja -C out/Release v8_monolith

      - name: Package Release
        run: |
          cd v8
          mkdir -p ../pack/lib ../pack/include
          cp -r include/* ../pack/include/
          cp out/Release/obj/libv8_monolith.a ../pack/lib/
          cd ../pack
          tar -czf ../v8-${{ env.V8_VERSION }}-linux64.tar.gz .

      - name: Upload V8 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: v8-release
          path: v8-${{ env.V8_VERSION }}-linux64.tar.gz
          retention-days: 3